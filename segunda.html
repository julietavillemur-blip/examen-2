<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Multimedia | Julieta Villemur</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Contenedor responsivo para el video */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            overflow: hidden;
            margin: 20px 0;
            border-radius: 10px;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Inspiración Musical</h1>
            <p>El rock nacional siempre acompaña mi proceso creativo. Aquí puedes reproducir este tema:</p>
            
            <!-- Embebido real del video -->
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/3-z9I2k4G4g" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                </iframe>
            </div>
            
            <p><small>Autoría del video: Luis Alberto Spinetta, vía YouTube (Canal oficial).</small></p>
            
            <a href="index.html">← Volver al inicio</a>
        </div>
    </div>
</body>
</html>
